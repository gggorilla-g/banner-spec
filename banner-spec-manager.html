/* ════ CAROUSEL ════ */
let _carouselDragSrc = null;

function carouselDragStart(e, phId, fmtId, vid) {
  _carouselDragSrc = { phId, fmtId, vid };
  e.dataTransfer.effectAllowed = 'move';
}

function carouselDrop(e, phId, fmtId, toVid) {
  e.preventDefault();
  e.currentTarget.classList.remove('carousel-drag-over');
  if (!_carouselDragSrc || _carouselDragSrc.vid === toVid) return;
  const ph = phases.find(p => p.id === phId); if (!ph) return;
  const variants = ph.formats[fmtId].variants;
  const fromIdx = variants.findIndex(v => v.id === _carouselDragSrc.vid);
  const toIdx   = variants.findIndex(v => v.id === toVid);
  if (fromIdx < 0 || toIdx < 0) return;
  const [moved] = variants.splice(fromIdx, 1);
  variants.splice(toIdx, 0, moved);
  _carouselDragSrc = null;
  const baseId = fmtId.replace(/_\d+$/, '');
  const fmt = FORMATS.find(f => f.id === fmtId) || FORMATS.find(f => f.id === baseId);
  refreshFormatPanel(ph, { ...fmt, id: fmtId });
  saveState();
}

/* カルーセルモックアップ */
let _carouselState = { phId: null, fmtId: null, idx: 0 };

function openCarouselPreview(phId, fmtId, vid) {
  const ph = phases.find(p => p.id === phId); if (!ph) return;
  const baseId = fmtId.replace(/_\d+$/, '');
  const fmt = FORMATS.find(f => f.id === fmtId) || FORMATS.find(f => f.id === baseId); if (!fmt) return;
  const variants = ph.formats[fmtId].variants;
  const idx = variants.findIndex(v => v.id === vid);

  _carouselState = { phId, fmtId, idx: idx >= 0 ? idx : 0 };

  const badge = document.getElementById('igpFormatBadge');
  if (badge) badge.textContent = fmt.label + ' (' + fmt.ratio + ')';

  // Feed SVGを使う
  const svgWrap = document.getElementById('igpSvgWrap');
  const rawWrap = document.getElementById('igpRawWrap');
  if (svgWrap) svgWrap.style.display = 'block';
  if (rawWrap) rawWrap.style.display = 'none';
  document.getElementById('bsSvgFeed').style.display  = 'block';
  document.getElementById('bsSvgStory').style.display = 'none';

  // 矢印ボタンを表示
  ['igpCarouselPrev','igpCarouselNext'].forEach(id => {
    const el = document.getElementById(id);
    el.style.display = 'flex';
    el.style.alignItems = 'center';
    el.style.justifyContent = 'center';
  });
  document.getElementById('igpCarouselCounter').style.display = 'block';
  const capBar = document.querySelector('.igp-caption-bar');
  if (capBar) capBar.style.display = 'none';

  _carouselSetSlide(phId, fmtId, _carouselState.idx);
  document.getElementById('igPreviewModal').classList.add('open');
}

function _carouselSetSlide(phId, fmtId, idx, dir) {
  const ph = phases.find(p => p.id === phId); if (!ph) return;
  const variants = ph.formats[fmtId].variants;
  idx = Math.max(0, Math.min(idx, variants.length - 1));
  _carouselState.idx = idx;
  const v = variants[idx];
  const imgObj = v.img ? ph.assets.find(a => a.id === v.img) : null;
  const svgImg = document.getElementById('bsImg');
  const svgBg  = document.getElementById('bsImgBg');
  const svgWrap = document.getElementById('igpSvgWrap');
  if (svgImg) {
    if (imgObj) {
      svgImg.setAttribute('href', imgObj.url);
      svgImg.setAttribute('visibility', 'visible');
      if (svgBg) svgBg.setAttribute('fill', 'transparent');
    } else {
      svgImg.setAttribute('href', '');
      svgImg.setAttribute('visibility', 'hidden');
      if (svgBg) svgBg.setAttribute('fill', '#e4e4e4');
    }
  }
  // スライドアニメーション: 旧画像アウト + 新画像イン同時
  if (dir !== undefined) {
    const baseX = 6.1;
    const w = 111.5;
    const nextImg = document.getElementById('bsImgNext');
    if (svgImg && nextImg && imgObj) {
      // 新画像をnextImgにセット（画面外から開始）
      const newStartX = dir > 0 ? baseX + w : baseX - w;
      const oldEndX   = dir > 0 ? baseX - w : baseX + w;
      nextImg.setAttribute('href', imgObj.url);
      nextImg.setAttribute('x', newStartX);
      nextImg.setAttribute('visibility', 'visible');
      if (svgBg) svgBg.setAttribute('fill', 'transparent');
      // 旧画像(svgImg)はそのままxをずらしてアウト
      const oldStartX = parseFloat(svgImg.getAttribute('x') || baseX);
      const start = performance.now();
      const duration = 260;
      (function step(now) {
        const t = Math.min((now - start) / duration, 1);
        const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
        // 新画像イン
        nextImg.setAttribute('x', newStartX + (baseX - newStartX) * ease);
        // 旧画像アウト
        svgImg.setAttribute('x', oldStartX + (oldEndX - oldStartX) * ease);
        if (t < 1) {
          requestAnimationFrame(step);
        } else {
          // 完了: svgImgに新画像を移してnextImgを隠す
          svgImg.setAttribute('href', imgObj.url);
          svgImg.setAttribute('x', baseX);
          svgImg.setAttribute('visibility', 'visible');
          nextImg.setAttribute('visibility', 'hidden');
          nextImg.setAttribute('href', '');
        }
      })(start);
    }
  }
  // カウンター更新
  const counter = document.getElementById('igpCarouselCounter');
  if (counter) counter.textContent = `${idx+1} / ${variants.length}`;
  // 矢印の有効/無効
  var prev = document.getElementById('igpCarouselPrev'); if(prev) prev.style.opacity = idx === 0 ? '0.3' : '1';
  var next = document.getElementById('igpCarouselNext'); if(next) next.style.opacity = idx === variants.length-1 ? '0.3' : '1';
}

function carouselNav(dir) {
  const { phId, fmtId, idx } = _carouselState;
  const ph = phases.find(p => p.id === phId); if (!ph) return;
  const variants = ph.formats[fmtId].variants;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= variants.length) return;
  _carouselSetSlide(phId, fmtId, newIdx, dir);
}

function openIgPreview(phId, fmtId, vid) {

/* ════════════════════════════════════════════════════════
   iOS タッチドラッグ
   file:// + Safari では HTML5 DnD が動作しないため、
   touchstart/touchmove/touchend で代替する。
   対象: pool thumb → img slot / カルーセル並び替え
════════════════════════════════════════════════════════ */
let _td = null;       // pool thumb drag state
let _tdGhost = null;  // フォローするゴースト画像

function _initPoolThumbTouch(imgEl, phId, assetId) {
  imgEl.addEventListener('touchstart', function(e) {
    if (e.touches.length > 1) return;
    const t = e.touches[0];
    _td = { phId, assetId, startX: t.clientX, startY: t.clientY, moved: false };
  }, { passive: true });

  imgEl.addEventListener('touchmove', function(e) {
    if (!_td) return;
    const t = e.touches[0];
    const dist = Math.hypot(t.clientX - _td.startX, t.clientY - _td.startY);
    if (!_td.moved && dist > 8) {
      _td.moved = true;
      dragSrc = { phId: _td.phId, assetId: _td.assetId };
      // ゴースト画像を生成してフィンガーに追従させる
      _tdGhost = document.createElement('img');
      _tdGhost.src = imgEl.src;
      _tdGhost.style.cssText = 'position:fixed;pointer-events:none;z-index:9999;opacity:.75;width:56px;height:56px;object-fit:cover;border-radius:6px;transform:translate(-50%,-50%)';
      document.body.appendChild(_tdGhost);
    }
    if (!_td.moved) return;
    e.preventDefault(); // スクロールを抑止
    _tdGhost.style.left = t.clientX + 'px';
    _tdGhost.style.top  = t.clientY + 'px';
    // ドロップ先スロットをハイライト
    document.querySelectorAll('.v-img-slot.drag-hover').forEach(el => el.classList.remove('drag-hover'));
    const under = document.elementFromPoint(t.clientX, t.clientY);
    under?.closest('.v-img-slot')?.classList.add('drag-hover');
  }, { passive: false });

  function _tdEnd(e) {
    if (!_td) return;
    document.querySelectorAll('.v-img-slot.drag-hover').forEach(el => el.classList.remove('drag-hover'));
    if (_tdGhost) { _tdGhost.remove(); _tdGhost = null; }
    if (_td.moved) {
      const t = e.changedTouches[0];
      const under = document.elementFromPoint(t.clientX, t.clientY);
      const slot = under?.closest('.v-img-slot');
      if (slot) {
        // ondrop 属性から phId/fmtId/vid を取得して onSlotDrop を呼ぶ
        const m = (slot.getAttribute('ondrop') || '').match(/onSlotDrop\(event,'([^']+)','([^']+)','([^']+)'\)/);
        if (m) {
          onSlotDrop(
            { dataTransfer: { getData: () => _td.assetId }, currentTarget: slot, preventDefault() {} },
            m[1], m[2], m[3]
          );
        }
      }
    }
    dragSrc = null;
    _td = null;
  }
  imgEl.addEventListener('touchend',    _tdEnd, { passive: true });
  imgEl.addEventListener('touchcancel', _tdEnd, { passive: true });
}

/* ── カルーセル並び替え タッチ（イベント委譲） ── */
(function() {
  let _ct = null; // { el, phId, fmtId, vid, startX, startY, moved }
  document.addEventListener('touchstart', function(e) {
    const card = e.target.closest('.variant-card[draggable="true"]');
    if (!card) return;
    const m = (card.getAttribute('ondragstart') || '').match(/carouselDragStart\(event,'([^']+)','([^']+)','([^']+)'\)/);
    if (!m) return;
    const t = e.touches[0];
    _ct = { el: card, phId: m[1], fmtId: m[2], vid: m[3], startX: t.clientX, startY: t.clientY, moved: false };
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!_ct) return;
    const t = e.touches[0];
    if (!_ct.moved && Math.hypot(t.clientX - _ct.startX, t.clientY - _ct.startY) > 8) {
      _ct.moved = true;
      _carouselDragSrc = { phId: _ct.phId, fmtId: _ct.fmtId, vid: _ct.vid };
    }
    if (!_ct.moved) return;
    e.preventDefault();
    document.querySelectorAll('.carousel-drag-over').forEach(el => el.classList.remove('carousel-drag-over'));
    const under = document.elementFromPoint(t.clientX, t.clientY);
    under?.closest('.variant-card[draggable="true"]')?.classList.add('carousel-drag-over');
  }, { passive: false });

  function _ctEnd(e) {
    if (!_ct) return;
    document.querySelectorAll('.carousel-drag-over').forEach(el => el.classList.remove('carousel-drag-over'));
    if (_ct.moved && _carouselDragSrc) {
      const t = e.changedTouches[0];
      const under = document.elementFromPoint(t.clientX, t.clientY);
      const target = under?.closest('.variant-card[draggable="true"]');
      if (target && target !== _ct.el) {
        const m = (target.getAttribute('ondrop') || '').match(/carouselDrop\(event,'([^']+)','([^']+)','([^']+)'\)/);
        if (m) carouselDrop({ preventDefault() {}, currentTarget: target }, m[1], m[2], m[3]);
      }
      _carouselDragSrc = null;
