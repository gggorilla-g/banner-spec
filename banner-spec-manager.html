<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BannerSpec</title>
<!-- Google Fonts は file:// から読み込めないため除去。システムフォントにフォールバック -->
<style>
/* ════════════════════════════════════
   DESIGN TOKENS
════════════════════════════════════ */
:root {
  --bg:           #f4f5f7;
  --surface:      #ffffff;
  --surface2:     #f8f8fb;
  --surface3:     #f0f1f4;
  --border:       #e2e3e9;
  --border-mid:   #cacad6;
  --text:         #16161d;
  --text-mid:     #3a3a4a;
  --text-muted:   #696979;
  --text-faint:   #9999ac;
  --accent:       #2563eb;
  --accent-h:     #1d4ed8;
  --accent-lt:    #eff6ff;
  --accent-bd:    #bfdbfe;
  --green:        #16a34a;
  --red:          #dc2626;
  --red-lt:       #fef2f2;
  --red-bd:       #fecaca;
  --amber:        #d97706;
  --r-xs: 4px;
  --r-sm: 6px;
  --r:    10px;
  --r-lg: 14px;
  --sh:   0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 12px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.05);
  --font: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", system-ui, sans-serif;
}
/* ════════════════════════════════════
   DARK MODE TOKENS
════════════════════════════════════ */
body[data-theme="dark"] {
  --bg:           #1a1a2e;
  --surface:      #16213e;
  --surface2:     #1a2540;
  --surface3:     #1e2a48;
  --border:       #2a2a4a;
  --border-mid:   #3a3a5e;
  --text:         #e0e0e0;
  --text-mid:     #b0b0c8;
  --text-muted:   #8080a4;
  --text-faint:   #606080;
  --accent-lt:    rgba(37,99,235,.18);
  --accent-bd:    rgba(37,99,235,.45);
  --red-lt:       rgba(220,38,38,.18);
  --red-bd:       rgba(220,38,38,.45);
  --sh:           0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
  --sh-md:        0 4px 12px rgba(0,0,0,.4), 0 1px 3px rgba(0,0,0,.3);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { font-size:13px }
body { font-family:var(--font); background:var(--bg); color:var(--text); line-height:1.6; -webkit-font-smoothing:antialiased; transition:background .25s, color .25s; }
input,textarea,select,button { font-family:var(--font); font-size:inherit }

/* ════════════════════════════════════
   SCROLLBAR
════════════════════════════════════ */
::-webkit-scrollbar { width:5px; height:5px }
::-webkit-scrollbar-track { background:transparent }
::-webkit-scrollbar-thumb { background:#d4d4df; border-radius:99px }
body[data-theme="dark"] ::-webkit-scrollbar-thumb { background:#3a3a5e }

/* ════════════════════════════════════
   PAGE STRUCTURE
════════════════════════════════════ */
.page { max-width:1056px; margin:0 auto; padding:0 24px 80px }

/* ════════════════════════════════════
   HEADER
════════════════════════════════════ */
.hdr {
  position:sticky; top:0; z-index:200;
  background:rgba(255,255,255,.96); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 24px; height:52px;
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  transition:background .25s, border-color .25s;
}
body[data-theme="dark"] .hdr { background:rgba(26,26,46,.96); }
.theme-toggle-btn {
  width:28px; height:28px; border-radius:50%;
  border:1px solid var(--border); background:var(--surface);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:14px; line-height:1; transition:background .12s, border-color .12s;
  flex-shrink:0;
}
.theme-toggle-btn:hover { background:var(--surface3); border-color:var(--border-mid); }
.hdr-logo { font-size:14px; font-weight:700; letter-spacing:-.3px; display:flex; align-items:center; gap:7px }
.logo-pip { width:7px; height:7px; border-radius:50%; background:var(--accent) }
.hdr-right { display:flex; align-items:center; gap:8px }

/* ════════════════════════════════════
   PROJECT CARD
════════════════════════════════════ */
.proj-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg); box-shadow:var(--sh);
  padding:24px 28px; margin:20px 0 8px;
}
.proj-top { display:flex; align-items:flex-start; justify-content:space-between; gap:20px }
.proj-kicker { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--text-faint); margin-bottom:6px }
.proj-name-input {
  font-size:24px; font-weight:700; letter-spacing:-.4px; color:var(--text);
  background:transparent; border:none; outline:none; width:100%;
  caret-color:var(--accent);
}
.proj-name-input::placeholder { color:#d0d0dd; font-weight:400 }

/* Event duration — global, prominent */
.event-duration-block { margin-top:16px }
.duration-kicker { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--text-faint); margin-bottom:8px }
.duration-range-pill {
  display:inline-flex; align-items:center; gap:8px;
  border:1px solid var(--border); border-radius:var(--r);
  padding:6px 12px; background:var(--surface2); cursor:pointer;
  transition:border-color .12s; user-select:none;
}
.duration-range-pill:hover { border-color:var(--border-mid) }
.duration-range-pill.open { border-color:var(--accent); background:var(--accent-lt) }
.drp-date { font-size:15px; font-weight:600; color:var(--text); letter-spacing:0.03em; }
.drp-date.placeholder { color:var(--text-faint); font-weight:400; font-size:13px; letter-spacing:normal; }
.drp-sep { font-size:13px; color:var(--text-faint); margin:0 0.4em; }

/* Date picker popover */
.date-popover {
  position:absolute; z-index:300;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg); box-shadow:var(--sh-md);
  padding:20px; display:none; gap:16px 20px; flex-wrap:wrap;
  min-width:440px;
}
.date-popover.open { display:flex }
.date-popover.fixed-pop { position:fixed; }

/* ════════════════════════════════════
   PHASE DATE PICKER — redesigned
════════════════════════════════════ */
.phase-date-pop {
  position:fixed; z-index:9999;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg);
  box-shadow:0 8px 32px rgba(0,0,0,.14), 0 2px 8px rgba(0,0,0,.08);
  padding:20px; display:none; flex-direction:column; gap:16px;
  min-width:320px;
}
.phase-date-pop.open { display:flex; }
.phase-date-pop-field { display:flex; flex-direction:column; gap:7px; }
.phase-date-pop-label {
  font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:1.5px; color:var(--text-faint);
}
.phase-date-row { display:flex; gap:8px; align-items:center; }
.phase-date-input {
  background:var(--surface2); border:1.5px solid var(--border);
  border-radius:var(--r-sm); padding:10px 12px; font-size:14px;
  color:var(--text); outline:none; cursor:pointer; flex:1;
  transition:border-color .12s;
}
.phase-date-input:hover { border-color:var(--border-mid); }
.phase-date-input:focus { border-color:var(--accent); }
.phase-time-sel {
  background:var(--surface2); border:1.5px solid var(--border);
  border-radius:var(--r-sm); padding:10px 8px; font-size:14px;
  color:var(--text); outline:none; cursor:pointer; width:96px;
  transition:border-color .12s; appearance:none; text-align:center;
}
.phase-time-sel:hover { border-color:var(--border-mid); }
.phase-time-sel:focus { border-color:var(--accent); }
.phase-date-pop-divider { height:1px; background:var(--border); margin:2px 0; }
.phase-date-pop-actions {
  display:flex; align-items:center; gap:8px; padding-top:4px;
}
.phase-date-pop-save {
  flex:1; padding:10px 24px; border-radius:var(--r-sm);
  background:var(--accent); color:#fff; border:none; cursor:pointer;
  font-size:13px; font-weight:600; transition:background .12s;
}
.phase-date-pop-save:hover { background:var(--accent-h); }
.phase-date-pop-clear {
  padding:10px 16px; border-radius:var(--r-sm);
  background:transparent; color:var(--text-muted);
  border:1px solid var(--border); cursor:pointer;
  font-size:13px; font-weight:500; transition:all .12s; white-space:nowrap;
}
.phase-date-pop-clear:hover { background:var(--red-lt); border-color:var(--red-bd); color:var(--red); }
.dp-col { display:flex; flex-direction:column; gap:6px }
.dp-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-faint) }
.dp-native {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--r-sm); padding:8px 10px; font-size:13px;
  color:var(--text-mid); outline:none; cursor:pointer;
  min-width:190px;
}
.dp-native:focus { border-color:var(--accent) }
.dp-apply {
  align-self:flex-end; padding:6px 16px; border-radius:var(--r-sm);
  background:var(--accent); color:#fff; border:none; cursor:pointer;
  font-size:12px; font-weight:600; transition:background .12s;
}
.dp-apply:hover { background:var(--accent-h) }

/* Proj right stats */
.proj-stats { display:flex; gap:20px; flex-shrink:0 }
.pstat { text-align:center }
.pstat-n { font-size:19px; font-weight:700; color:var(--text); line-height:1.1 }
.pstat-n.red { color:var(--red) }
.pstat-l { font-size:10px; color:var(--text-faint); margin-top:1px }
.prog-row { display:flex; align-items:center; gap:8px; margin-top:14px; padding-top:14px; border-top:1px solid var(--border) }
.prog-track { flex:1; height:3px; background:var(--surface3); border-radius:99px; overflow:hidden }
.prog-fill { height:100%; border-radius:99px; background:var(--accent); transition:width .4s }
.prog-pct { font-size:11px; font-weight:600; color:var(--accent) }
.prog-label { font-size:11px; color:var(--text-faint) }

/* ════════════════════════════════════
   SECTION LABEL
════════════════════════════════════ */
.section-eyebrow {
  font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:2px;
  color:var(--text-faint); margin:20px 0 10px; display:flex; align-items:center; gap:8px;
}
.section-eyebrow::after { content:''; flex:1; height:1px; background:var(--border) }

/* ════════════════════════════════════
   PHASE CHIPS ROW
════════════════════════════════════ */
.phase-chips-row {
  display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:16px;
}
.phase-chip {
  display:inline-flex; align-items:center; gap:5px;
  padding:5px 10px 5px 12px;
  border:1.5px solid var(--border);
  border-radius:99px; background:var(--surface);
  cursor:pointer; transition:all .12s; font-size:12px; font-weight:500;
  color:var(--text-muted); user-select:none;
}
.phase-chip:hover { border-color:var(--border-mid); color:var(--text-mid) }
.phase-chip.active { color:var(--text); border-color:transparent; font-weight:700 }
.phase-chip-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0 }
.phase-chip-del {
  width:16px; height:16px; border-radius:50%; border:none; background:transparent;
  cursor:pointer; color:var(--text-faint); display:flex; align-items:center; justify-content:center;
  transition:all .12s; padding:0; margin-left:1px; flex-shrink:0;
}
.phase-chip-del:hover { background:var(--red-lt); color:var(--red) }
.add-phase-chip {
  display:inline-flex; align-items:center; gap:5px;
  padding:5px 12px; border:1.5px dashed var(--border-mid);
  border-radius:99px; background:transparent;
  cursor:pointer; transition:all .12s; font-size:12px;
  color:var(--text-faint);
}
.add-phase-chip:hover { border-color:var(--accent); color:var(--accent) }

/* ════════════════════════════════════
   PHASE MODULE (the expandable card)
════════════════════════════════════ */
.phase-module {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg); box-shadow:var(--sh);
  margin-bottom:12px; overflow:hidden;
  animation:riseIn .2s ease;
}
@keyframes riseIn { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:translateY(0) } }
.phase-module:not(.open) .phase-module-body { display:none }

/* Phase module header */
.phase-mod-hd {
  display:flex; align-items:center; gap:0;
  padding:0; cursor:pointer; user-select:none;
}
.phase-mod-colorbar { width:4px; align-self:stretch; flex-shrink:0; border-radius:var(--r-lg) 0 0 0 }
.phase-mod-hd-inner {
  flex:1; padding:14px 16px; display:flex; align-items:center; gap:12px; min-width:0;
}
.phase-mod-name-input {
  font-size:14px; font-weight:700; color:var(--text);
  background:transparent; border:none; outline:none; flex:1; min-width:0;
}
.phase-mod-name-input::placeholder { color:#d0d0dd; font-weight:400 }

/* Publishing period inside phase header — visually distinct from event duration */
.publish-period {
  display:flex; align-items:center; gap:6px;
  padding:4px 10px; border-radius:var(--r-sm);
  background:var(--surface2); border:1px solid var(--border);
  font-size:11px; color:var(--text-muted); cursor:pointer;
  transition:border-color .12s; flex-shrink:0;
}
.publish-period:hover { border-color:var(--border-mid) }
.publish-period.open-dp { border-color:var(--accent); background:var(--accent-lt) }
.pp-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-faint) }
.pp-dates { font-size:14px; font-weight:400; color:var(--text); line-height:1.4; letter-spacing:0.02em; font-feature-settings:"tnum"; }
.pp-placeholder { color:var(--text-faint); font-weight:400 }

.phase-mod-hd-right { display:flex; align-items:center; gap:4px; padding-right:12px; flex-shrink:0 }
.warn-chip {
  display:none; font-size:10px; font-weight:600;
  background:var(--red-lt); border:1px solid var(--red-bd);
  color:var(--red); padding:1px 7px; border-radius:20px;
}
.warn-chip.show { display:inline-block }
.icon-btn {
  background:none; border:none; cursor:pointer; padding:4px; border-radius:var(--r-sm);
  color:var(--text-faint); display:flex; align-items:center; transition:all .12s;
}
.icon-btn:hover { background:var(--surface3); color:var(--text-muted) }
.icon-btn.danger:hover { background:var(--red-lt); color:var(--red) }
.chevron-icon { transition:transform .2s }
.chevron-icon.open { transform:rotate(180deg) }

/* Phase module body */
.phase-module-body { border-top:1px solid var(--border) }

/* ════════════════════════════════════
   SCOPED ASSET POOL (per-phase)
════════════════════════════════════ */
.asset-pool-section {
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  background:var(--surface2);
}
.pool-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px }
.pool-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.8px; color:var(--text-faint); display:flex; align-items:center; gap:6px }
.pool-count { font-size:10px; background:var(--surface3); border:1px solid var(--border); color:var(--text-muted); border-radius:20px; padding:1px 7px; font-weight:600 }
.pool-upload-btn {
  display:inline-flex; align-items:center; gap:5px;
  padding:4px 10px; border-radius:var(--r-sm);
  border:1px solid var(--border); background:var(--surface);
  font-size:11px; font-weight:500; color:var(--text-muted); cursor:pointer;
  transition:all .12s;
}
.pool-upload-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-lt) }
.pool-drop-target {
  display:flex; flex-wrap:wrap; align-items:center; gap:7px;
  cursor:pointer; transition:outline .15s;
  border-radius:var(--r);
}
.pool-drop-target:hover,.pool-drop-target.drag-over {
  outline:2px dashed var(--accent); outline-offset:4px;
  background:var(--accent-lt);
}
.pool-hint { font-size:11px; color:var(--text-faint); display:flex; align-items:center; gap:5px }
.pool-thumb {
  width:52px; height:52px; border-radius:var(--r-sm);
  object-fit:contain; background:#f0f0f0; border:1.5px solid var(--border);
  cursor:grab; position:relative; flex-shrink:0;
  transition:transform .12s, border-color .12s, box-shadow .12s;
}
.pool-thumb:hover { transform:scale(1.06); border-color:var(--border-mid); box-shadow:0 3px 8px rgba(0,0,0,.12) }
.pool-thumb.dragging { opacity:.35; cursor:grabbing }
.pool-thumb-wrap { position:relative; display:inline-block }
.pool-thumb-del {
  position:absolute; top:-4px; right:-4px; z-index:5;
  width:16px; height:16px; border-radius:50%;
  background:rgba(0,0,0,.55); border:none; cursor:pointer;
  color:#fff; display:none; align-items:center; justify-content:center;
  transition:background .12s;
}
.pool-thumb-wrap:hover .pool-thumb-del { display:flex }
.pool-thumb-del:hover { background:var(--red) }

/* ════════════════════════════════════
   FORMAT TAGS
════════════════════════════════════ */
.format-tags-section { padding:12px 16px; border-bottom:1px solid var(--border) }
.format-tags-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap }
.fmt-tag {
  display:inline-flex; align-items:center; gap:6px;
  padding:5px 12px; border:1.5px solid var(--border);
  border-radius:99px; cursor:pointer; font-size:12px; font-weight:500;
  color:var(--text-muted); background:var(--surface); transition:all .12s;
  user-select:none;
}
.fmt-tag:hover { border-color:var(--border-mid); color:var(--text-mid) }
.fmt-tag.active { border-color:var(--accent); color:var(--accent); background:var(--accent-lt); font-weight:700 }
.fmt-tag-ratio { font-size:10px; font-weight:700; opacity:.7 }
.fmt-tag-del {
  display:none; align-items:center; justify-content:center;
  width:14px; height:14px; border-radius:50%; border:none;
  background:rgba(0,0,0,.12); color:var(--text-muted);
  font-size:10px; cursor:pointer; padding:0; line-height:1;
  margin-left:2px;
}
.fmt-tag:hover .fmt-tag-del { display:inline-flex; }
.fmt-tag-del:hover { background:var(--danger,#e53); color:#fff; }
.fmt-add-btn {
  display:inline-flex; align-items:center; justify-content:center;
  padding:4px 10px; border:1.5px dashed var(--border-mid);
  border-radius:99px; cursor:pointer; font-size:13px;
  color:var(--text-muted); background:transparent;
  transition:all .12s;
}
.fmt-add-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-lt); }
/* フォーマット追加ドロップダウン */
.fmt-add-dropdown {
  position:absolute; z-index:200; background:var(--surface);
  border:1.5px solid var(--border-mid); border-radius:var(--r-md);
  box-shadow:0 4px 20px rgba(0,0,0,.12); padding:4px;
  min-width:160px;
}
.fmt-add-dropdown button {
  display:block; width:100%; text-align:left;
  padding:8px 12px; border:none; background:none;
  font-size:13px; color:var(--text); cursor:pointer;
  border-radius:var(--r-sm);
}
.fmt-add-dropdown button:hover { background:var(--accent-lt); color:var(--accent); }

/* ════════════════════════════════════
   FORMAT PANEL (inside phase)
════════════════════════════════════ */
.format-panels { padding:0 }
.format-panel { display:none; padding:16px }
.format-panel.active { display:block }

/* Variants grid */
.variants-grid { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-start; margin-bottom:12px }
.variants-grid.carousel-grid { flex-wrap:nowrap; overflow-x:auto; padding-bottom:6px; }
.variant-card {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--r); padding:12px; flex:1; min-width:200px; max-width:280px;
  display:flex; flex-direction:column; gap:10px;
}
.carousel-grid .variant-card { flex:0 0 220px; min-width:220px; max-width:220px; }
.variant-card-hd { display:flex; align-items:center; gap:8px; border-bottom:1px dashed var(--border); padding-bottom:8px }
.v-badge {
  font-size:10px; font-weight:700; letter-spacing:.5px;
  padding:2px 8px; border-radius:4px;
}
.v-badge-0 { background:#dbeafe; color:#1e40af }
.v-badge-1 { background:#ede9fe; color:#6d28d9 }
.v-badge-2 { background:#dcfce7; color:#15803d }
.v-badge-3 { background:#fef3c7; color:#92400e }
.v-badge-4 { background:#fce7f3; color:#9d174d }
.v-name { font-size:12px; font-weight:600; color:var(--text-mid) }
.v-complete-dot { width:6px; height:6px; border-radius:50%; background:var(--green); margin-left:auto; display:none }
.v-complete-dot.show { display:block }

/* Image drop slot */
.v-img-slot {
  border:1.5px dashed var(--border-mid); border-radius:var(--r-sm);
  background:#f8f8fb;
  background-image:
    linear-gradient(45deg,#eeeef2 25%,transparent 25%),
    linear-gradient(-45deg,#eeeef2 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#eeeef2 75%),
    linear-gradient(-45deg,transparent 75%,#eeeef2 75%);
  background-size:12px 12px;

<!-- ══════════════════════════════════════
     JAVASCRIPT

<script>
/* ─── CONSTANTS ─── */
const FORMATS = [
  { id:'ig_feed',      label:'Instagram Feed',      ratio:'1:1',   dims:'1024×1024', cssRatio:'1/1' },
  { id:'ig_carousel',  label:'Instagram Carousel',  ratio:'1:1',   dims:'1024×1024', cssRatio:'1/1' },
  { id:'ig_story',     label:'Instagram Story',     ratio:'9:16',  dims:'1080×1920', cssRatio:'9/16' },
  { id:'meta',         label:'Google / Yahoo',      ratio:'19:10', dims:'2400×1256', cssRatio:'19/10' },
];
const PHASE_COLORS = ['#2563eb','#7c3aed','#c2410c','#059669','#0891b2','#be185d','#d97706'];
const VARIANT_LABELS = ['A案','B案','C案','D案','E案'];
/* ─── STATE ─── */
let phases = [];
let phCount = 0;
let currentMode = 'production'; // 'production' | 'client'
let currentUploadTarget = null; // { phId }
let dragSrc = null; // { phId, assetId }

/* ─── DATA MODEL
  phase: {
    id, name, color, pubStart, pubEnd,
    assets: [{ id, url, name }],
    activeFormat: 'ig_feed' | …,
    formats: {
      [formatId]: {
        variants: [{ id, img: assetId|null, text: '' }]
      }
    },
    open: bool
  }
─── */

/* ════ INIT ════ */
function init() {
  // プロジェクト名・イベント期間を復元（phases復元の成否に関わらず）
  try {
    const meta = JSON.parse(localStorage.getItem('bsMeta') || '{}');
    if (meta.projName) {
      const el = document.getElementById('projName');
      if (el) el.value = meta.projName;
    }
    if (meta.evtStart) {
      const el = document.getElementById('edStartNative');
      if (el) { el.value = (meta.evtStart||'').split('T')[0]; applyEventDate(); }
    }
    if (meta.evtEnd) {
      const el = document.getElementById('edEndNative');
      if (el) { el.value = (meta.evtEnd||'').split('T')[0]; applyEventDate(); }
    }
  } catch(e) {}

  applyTheme('production');
  loadState().then(restored => {
    if (!restored) {
      addPhase('ティザー');
      addPhase('Phase 1');
      updateStats();
    }
    // BlobURLをBase64に修復
    fixBlobUrls();
  });
}

function fixBlobUrls() {
  let needsSave = false;
  const promises = [];
  phases.forEach(ph => {
    ph.assets.forEach(a => {
      if (a.url && a.url.startsWith('blob:')) {
        const p = fetch(a.url)
          .then(r => r.blob())
          .then(blob => new Promise((res, rej) => {
            const reader = new FileReader();
            reader.onload = e => { a.url = e.target.result; needsSave = true; res(); };
            reader.onerror = rej;
            reader.readAsDataURL(blob);
          }))
          .catch(() => {}); // BlobURLが無効な場合はスキップ
        promises.push(p);
      }
    });
  });
  if (promises.length > 0) {
    Promise.all(promises).then(() => {
      if (needsSave) { saveState(); phases.forEach(ph => refreshPool(ph)); }
    });
  }
}

/* ════ DATE PICKERS — event-level ════ */
function toggleDatePop(id) {
  const pop = document.getElementById(id);
  const pill = document.getElementById('eventDurationPill');
  const isOpen = pop.classList.toggle('open');
  if (pill) pill.classList.toggle('open', isOpen);
  if (isOpen) {
    document.addEventListener('click', outsideDateClose, true);
  }
}
function closeDatePop(id) {
  document.getElementById(id)?.classList.remove('open');
  document.getElementById('eventDurationPill')?.classList.remove('open');
}
function outsideDateClose(e) {
  const pop = document.getElementById('eventDp');
  const pill = document.getElementById('eventDurationPill');
  if (pop && !pop.contains(e.target) && pill && !pill.contains(e.target)) {
    pop.classList.remove('open');
    pill.classList.remove('open');
    document.removeEventListener('click', outsideDateClose, true);
  }
}
function fmtDatetime(d) {
  if (!d) return '';
  if (d.includes('T')) {
    const [date, time] = d.split('T');
    return date.replace(/-/g, '.') + ' ' + time.slice(0, 5);
  }
  return d.replace(/-/g, '.');
}

function toDatetimeLocal(val) {
  if (!val) return '';
  if (val.includes('T')) return val.slice(0, 16);
  return val + 'T00:00';
}

function fmtEventDate(dateStr) {
  if (!dateStr) return '';
  const d = dateStr.includes('T') ? dateStr.split('T')[0] : dateStr;
  const [y, m, day] = d.split('-').map(Number);
  if (!y || !m || !day) return d.replace(/-/g, '.');
  const dow = DAY_JA[new Date(y, m - 1, day).getDay()];
  return `${m}.${day}(${dow})`;
}

function applyEventDateDisplay() {
  const s = document.getElementById('edStartNative').value;
  const e = document.getElementById('edEndNative').value;
  const sEl = document.getElementById('edStart');
  const eEl = document.getElementById('edEnd');
  if (s && sEl) { sEl.textContent = fmtEventDate(s); sEl.classList.remove('placeholder'); }
  if (e && eEl) { eEl.textContent = fmtEventDate(e); eEl.classList.remove('placeholder'); }
}

function applyEventDate() {
  const s = document.getElementById('edStartNative').value;
  const e = document.getElementById('edEndNative').value;
  const sEl = document.getElementById('edStart');
  const eEl = document.getElementById('edEnd');
  if (s) { sEl.textContent = fmtEventDate(s); sEl.classList.remove('placeholder'); }
  if (e) { eEl.textContent = fmtEventDate(e); eEl.classList.remove('placeholder'); }
  if (phases.length > 0) saveState();
}

/* Per-phase publish period picker */
function togglePhaseDatePop(phId, e) {
  e.stopPropagation();
  const pop = document.getElementById(`phasedp_${phId}`);
  const btn = document.getElementById(`ppbtn_${phId}`);
  if (!pop) return;
  const isOpen = pop.classList.toggle('open');
  btn?.classList.toggle('open-dp', isOpen);
  if (isOpen) {
    const r = btn.getBoundingClientRect();
    const popW = 320, popH = 280;
    let left = r.left;
    let top  = r.bottom + 6;
    if (left + popW > window.innerWidth  - 8) left = Math.max(8, window.innerWidth  - popW - 8);
    if (top  + popH > window.innerHeight - 8) top  = Math.max(8, r.top - popH - 6);
    pop.style.top  = top  + 'px';
    pop.style.left = left + 'px';
  }
}

function _closePhaseDatePopsOnScroll() {
  document.querySelectorAll('.phase-date-pop.open').forEach(pop => {
    pop.classList.remove('open');
    const phId = pop.id.replace('phasedp_', '');
    document.getElementById(`ppbtn_${phId}`)?.classList.remove('open-dp');
  });
}
window.addEventListener('scroll', _closePhaseDatePopsOnScroll, true);

document.addEventListener('click', e => {
  document.querySelectorAll('.phase-date-pop.open').forEach(pop => {
    const phId = pop.id.replace('phasedp_', '');
    const btn = document.getElementById(`ppbtn_${phId}`);
    if (!pop.contains(e.target) && !btn?.contains(e.target)) {
      pop.classList.remove('open');
      btn?.classList.remove('open-dp');
    }
  });
});
const DAY_JA = ['日','月','火','水','木','金','土'];

function buildTimeOptions(selected) {
  let html = '';
  for (let h = 0; h < 24; h++) {
    for (const m of [0, 30]) {
      const v = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
      html += `<option value="${v}"${v === selected ? ' selected' : ''}>${v}</option>`;
    }
  }
  return html;
}

function fmtPubDateHTML(isoStr) {
  if (!isoStr) return '';
  const [datePart, timePart] = isoStr.split('T');
  if (!datePart) return '';
  const [y, m, d] = datePart.split('-').map(Number);
  if (!y || !m || !d) return '';
  const dow = DAY_JA[new Date(y, m - 1, d).getDay()];
  const dateHtml = `<span style="font-weight:600">${m}.${d}</span><span style="font-weight:400">(${dow})</span>`;
  const timeHtml = timePart ? `<span style="font-weight:400;margin-left:0.35em">${timePart.slice(0, 5)}</span>` : '';
  return dateHtml + timeHtml;
}

function _setPhaseDatesDisplay(phId) {
  const ph = phases.find(p => p.id === phId); if (!ph) return;
  const datesEl = document.getElementById(`ppbtn_${phId}`)?.querySelector('.pp-dates');
  if (!datesEl) return;
  if (ph.pubStart || ph.pubEnd) {
    const sep = '<span style="font-weight:400;color:var(--text-faint);margin:0 0.5em">〜</span>';
    datesEl.innerHTML = [fmtPubDateHTML(ph.pubStart), fmtPubDateHTML(ph.pubEnd)].filter(Boolean).join(sep);
    datesEl.classList.remove('pp-placeholder');
  } else {
    datesEl.textContent = '掲載期間を設定';
    datesEl.classList.add('pp-placeholder');
  }
}

function applyPhaseDate(phId) {
  const ph = phases.find(p => p.id === phId); if (!ph) return;
  const sd = document.getElementById(`pds_${phId}`)?.value;
  const st = document.getElementById(`pds_time_${phId}`)?.value || '00:00';
  const ed = document.getElementById(`pde_${phId}`)?.value;
  const et = document.getElementById(`pde_time_${phId}`)?.value || '23:30';
  ph.pubStart = sd ? `${sd}T${st}` : '';
  ph.pubEnd   = ed ? `${ed}T${et}` : '';
  _setPhaseDatesDisplay(phId);
  saveState();
}

function clearPhaseDate(phId, e) {
  if (e) e.stopPropagation();
  const ph = phases.find(p => p.id === phId); if (!ph) return;
  ph.pubStart = '';
  ph.pubEnd   = '';
  const sd = document.getElementById(`pds_${phId}`);
  const st = document.getElementById(`pds_time_${phId}`);
  const ed = document.getElementById(`pde_${phId}`);
  const et = document.getElementById(`pde_time_${phId}`);
  if (sd) sd.value = '';
  if (st) st.value = '00:00';
  if (ed) ed.value = '';
  if (et) et.value = '23:30';
  _setPhaseDatesDisplay(phId);
  saveState();
}

/* ════ PHASES ════ */
function addPhase(name) {
  phCount++;
  const id    = 'ph' + phCount;
  const color = PHASE_COLORS[(phCount - 1) % PHASE_COLORS.length];
  const formats = {};
  FORMATS.forEach(f => {
    formats[f.id] = { variants: [mkVariant(), mkVariant()] };
  });
  const ph = {
    id, name: name || `フェーズ ${phCount}`, color,
    pubStart: '', pubEnd: '',
    assets: [],
    clientPoolAssets: [],
    activeFormat: FORMATS[0].id,
    formats,
    open: true,
  };
  phases.push(ph);
  renderPhaseChip(ph);
  renderPhaseModule(ph);
  updateStats();
}

function mkVariant() {
  return { id: 'v' + Date.now() + Math.random().toString(36).slice(2,5), img: null, text: '', fields: [], clientLayers: [], clientActiveLayerId: null, clientMemo: '' };
}

function deletePhase(id, ev) {
  ev?.stopPropagation();
  if (phases.length <= 1) return;
  phases = phases.filter(p => p.id !== id);
  document.getElementById(`pchip_${id}`)?.remove();
  document.getElementById(`pmod_${id}`)?.remove();
  updateStats();
}

function togglePhaseOpen(id) {
  const ph = phases.find(p => p.id === id); if (!ph) return;
  ph.open = !ph.open;
  const mod  = document.getElementById(`pmod_${id}`);
  const chev = document.getElementById(`pchev_${id}`);
  mod?.classList.toggle('open', ph.open);
  chev?.classList.toggle('open', ph.open);
}

/* ─ Chip ─ */
function renderPhaseChip(ph) {
  const row = document.getElementById('phaseChipsRow');
  const addBtn = row.querySelector('.add-phase-chip');
  const chip = document.createElement('div');
  chip.className = 'phase-chip active';
  chip.id = `pchip_${ph.id}`;
  chip.setAttribute('data-ph', ph.id);
  chip.onclick = () => scrollToPhase(ph.id);
  chip.innerHTML = `
    <span class="phase-chip-dot" style="background:${ph.color}"></span>
    <span class="phase-chip-name">${esc(ph.name)}</span>
    <button class="phase-chip-del" onclick="deletePhase('${ph.id}',event)" title="削除">
      <svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/>
      </svg>
    </button>`;
  row.insertBefore(chip, addBtn);
}

function scrollToPhase(id) {
  document.getElementById(`pmod_${id}`)?.scrollIntoView({ behavior:'smooth', block:'start' });
}

/* ─ Module ─ */
function renderPhaseModule(ph) {
  const container = document.getElementById('phaseModules');
  const el = document.createElement('div');
  el.className = 'phase-module' + (ph.open ? ' open' : '');
  el.id = `pmod_${ph.id}`;

  const [_psd, _pst] = (ph.pubStart || '').split('T');
  const [_ped, _pet] = (ph.pubEnd   || '').split('T');
  const _initST = _pst || '00:00';
  const _initET = _pet || '23:30';

  el.innerHTML = `
    <!-- Module Header -->
    <div class="phase-mod-hd" onclick="togglePhaseOpen('${ph.id}')">
      <div class="phase-mod-colorbar" style="background:${ph.color}"></div>
      <div class="phase-mod-hd-inner">
        <input class="phase-mod-name-input" value="${esc(ph.name)}" placeholder="フェーズ名..."
          onclick="event.stopPropagation()"
          oninput="updatePhaseName('${ph.id}',this.value)">

        <!-- PUBLISHING PERIOD — per-phase, visually subordinate -->
        <div style="position:relative" onclick="event.stopPropagation()">
          <div class="publish-period" id="ppbtn_${ph.id}" onclick="togglePhaseDatePop('${ph.id}',event)">
            <span class="pp-label">掲載期間</span>
            <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
              <rect x="2" y="3" width="12" height="11" rx="2"/>
              <line x1="2" y1="7" x2="14" y2="7"/>
              <line x1="5" y1="1" x2="5" y2="4"/>
              <line x1="11" y1="1" x2="11" y2="4"/>
            </svg>
            <span class="pp-dates${ph.pubStart||ph.pubEnd?'':' pp-placeholder'}" id="ppDates_${ph.id}">${ph.pubStart||ph.pubEnd ? [fmtPubDateHTML(ph.pubStart),fmtPubDateHTML(ph.pubEnd)].filter(Boolean).join('<span style="font-weight:400;color:var(--text-faint);margin:0 0.5em">〜</span>') : '未設定'}</span>
          </div>
          <div class="phase-date-pop" id="phasedp_${ph.id}">
            <div class="phase-date-pop-field">
              <div class="phase-date-pop-label">開始日時</div>

// フォーマット削除（確認あり）
function removeFormat(phId, fmtId) {
  const ph = phases.find(p => p.id === phId); if (!ph) return;
  // アラートなしで即削除
  delete ph.formats[fmtId];
  // アクティブなら別のフォーマットに切り替え
  if (ph.activeFormat === fmtId) {
    const remaining = Object.keys(ph.formats);
    ph.activeFormat = remaining[0] || null;
  }
  // DOM更新
  document.getElementById(`fpanel_${phId}_${fmtId}`)?.remove();
  document.getElementById(`ftag_${phId}_${fmtId}`)?.remove();
  if (ph.activeFormat) setActiveFormat(phId, ph.activeFormat);
  checkPhaseWarn(ph);
  updateStats();
  saveState();
}

// フォーマット追加ドロップダウン
let _fmtDropdown = null;
function showAddFormat(e, phId) {
  e.stopPropagation();
  closeFmtDropdown();
  const ph = phases.find(p => p.id === phId); if (!ph) return;

  const dd = document.createElement('div');
  dd.className = 'fmt-add-dropdown';
  dd.style.cssText = 'position:fixed;z-index:9999;';

  FORMATS.forEach(f => {
    const btn = document.createElement('button');
    btn.textContent = `${f.label}  ${f.ratio}`;
    btn.onclick = () => {
      // 同じフォーマットが既にあればユニークIDを生成
      let fmtId = f.id;
      let n = 2;
      while (ph.formats[fmtId]) { fmtId = `${f.id}_${n++}`; }

      ph.formats[fmtId] = { variants: [mkVariant(), mkVariant()] };

      // タグ追加（ラベルはベースフォーマットのものを使う）
      const tagsRow = document.getElementById(`fmtTags_${phId}`);
      const addBtn  = tagsRow?.querySelector('.fmt-add-btn');
      const tagDiv  = document.createElement('div');
      tagDiv.innerHTML = `
        <div class="fmt-tag" id="ftag_${phId}_${fmtId}" onclick="setActiveFormat('${phId}','${fmtId}')">
          <span>${f.label}</span>
          <span class="fmt-tag-ratio">${f.ratio}</span>
          <button class="fmt-tag-del" onclick="event.stopPropagation();removeFormat('${phId}','${fmtId}')" title="削除">×</button>
        </div>`;
      tagsRow?.insertBefore(tagDiv.firstElementChild, addBtn);

      // パネル追加（fmtIdを使う）
      const panels = document.getElementById(`fmtPanels_${phId}`);
      if (panels) {
        // buildFormatPanelHTML は f.id を使うので一時的に上書き
        const fakeFmt = { ...f, id: fmtId };
        const div = document.createElement('div');
        div.innerHTML = buildFormatPanelHTML(ph, fakeFmt);
        panels.appendChild(div.firstElementChild);
      }
      setActiveFormat(phId, fmtId);
      saveState();
      closeFmtDropdown();
    };
    dd.appendChild(btn);
  });

  document.body.appendChild(dd);
  _fmtDropdown = dd;
  const rect = e.target.closest('button').getBoundingClientRect();
  dd.style.left = rect.left + 'px';
  dd.style.top  = (rect.bottom + 6) + 'px';
  setTimeout(() => document.addEventListener('click', closeFmtDropdown, {once:true}), 0);
}

function closeFmtDropdown() {
  if (_fmtDropdown) { _fmtDropdown.remove(); _fmtDropdown = null; }
}

function setActiveFormat(phId, fmtId) {
  const ph = phases.find(p => p.id === phId); if (!ph) return;
  ph.activeFormat = fmtId;
  Object.keys(ph.formats).forEach(fid => {
    document.getElementById(`ftag_${phId}_${fid}`)?.classList.toggle('active', fid === fmtId);
    document.getElementById(`fpanel_${phId}_${fid}`)?.classList.toggle('active', fid === fmtId);
  });
  saveState();
}

/* ════ VARIANTS ════ */
function addVariant(phId, fmtId) {
  const ph = phases.find(p => p.id === phId); if (!ph) return;
  const fmt = (FORMATS.find(f => f.id === fmtId) || FORMATS.find(f => f.id === fmtId.replace(/_\d+$/, '')));
  const v = mkVariant();
  ph.formats[fmtId].variants.push(v);
  const grid   = document.getElementById(`vgrid_${phId}_${fmtId}`);
  const addBtn = document.getElementById(`addVbtn_${phId}_${fmtId}`);
  const idx    = ph.formats[fmtId].variants.length - 1;
  const div = document.createElement('div');
  div.innerHTML = buildVariantCardHTML(ph, fmt ? { ...fmt, id: fmtId } : { id: fmtId, label: fmtId, ratio: '', cssRatio: '1/1', dims: '' }, v, idx);
  grid.insertBefore(div.firstElementChild, addBtn);
  updateStats();
  saveState();
}
function removeVariant(phId, fmtId, vid) {
  const ph = phases.find(p => p.id === phId); if (!ph) return;
  if (ph.formats[fmtId].variants.length <= 1) return;
  ph.formats[fmtId].variants = ph.formats[fmtId].variants.filter(v => v.id !== vid);
  const _rfmt = FORMATS.find(f => f.id === fmtId) || FORMATS.find(f => f.id === fmtId.replace(/_\d+$/, ''));
  refreshFormatPanel(ph, _rfmt ? { ..._rfmt, id: fmtId } : { id: fmtId, label: fmtId, ratio: '', cssRatio: '1/1', dims: '' });
  updateStats();
  saveState();
}
function refreshFormatPanel(ph, fmt) {
  const panel = document.getElementById(`fpanel_${ph.id}_${fmt.id}`); if (!panel) return;
  const isActive = panel.classList.contains('active');
  const div = document.createElement('div');
  div.innerHTML = buildFormatPanelHTML(ph, fmt);
  panel.replaceWith(div.firstElementChild);
  if (isActive) document.getElementById(`fpanel_${ph.id}_${fmt.id}`)?.classList.add('active');
}

// 画像をcanvasで圧縮してBase64に変換
function compressImage(file, maxW=1920, quality=0.92) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function onGlobalFileInput(e) {
  const ph = phases.find(p => p.id === currentUploadTarget); if (!ph) return;
  const files = Array.from(e.target.files);
  let processed = 0;
  const newIds = [];

  files.forEach(f => {
    const id = 'a'+Date.now()+Math.random().toString(36).slice(2,5);
    compressImage(f).then(url => {
      const a = { id, url, name: f.name };
      if (currentMode === 'client') {
        if (!ph.clientPoolAssets) ph.clientPoolAssets = [];
        ph.clientPoolAssets.push(a);
        dbPut(id, url).catch(e => console.warn('[BS] IDB保存失敗:', e));
        processed++;
        if (processed === files.length) { refreshPool(ph); saveState(); }
      } else {
        ph.assets.push(a);
        newIds.push(id);
        dbPut(id, url).catch(e => console.warn('[BS] IDB保存失敗:', e));
        processed++;
        if (processed === files.length) {
          if (_bsSlotCtx) {
            const { fmtId, vid } = _bsSlotCtx;
            const v = ph.formats[fmtId]?.variants.find(v => v.id === vid);
            if (v) v.img = newIds[0];
            _bsSlotCtx = null;
          }
          refreshPool(ph);
          Object.keys(ph.formats).forEach(fid => {
            const baseId = fid.replace(/_\d+$/, '');
            const fmt = FORMATS.find(f => f.id === fid) || FORMATS.find(f => f.id === baseId) || { id: fid, label: fid, ratio: '', cssRatio: '1/1', dims: '' };
            refreshFormatPanel(ph, { ...fmt, id: fid });
          });
          updateStats();
          saveState();
        }
      }
    });
  });
  e.target.value = '';
}

/* ════ 永続化: IndexedDB（画像）+ localStorage（構造） ════ */
/* file:// では IDB が SecurityError になるため、失敗時は無音で localStorage のみ動作 */
let _bsDB = null;
let _bsDBFailed = false;
function openDB() {
  return new Promise((resolve, reject) => {
    if (_bsDBFailed) { reject(new Error('IDB unavailable')); return; }
    if (_bsDB) { resolve(_bsDB); return; }
    try {
      const req = indexedDB.open('BannerSpecDB', 1);
      req.onupgradeneeded = e => {
        try { e.target.result.createObjectStore('images', { keyPath: 'id' }); } catch(e2) {}
      };
      req.onsuccess = e => { _bsDB = e.target.result; resolve(_bsDB); };
      req.onerror   = e => { _bsDBFailed = true; reject(e.target.error); };
      req.onblocked = () => { _bsDBFailed = true; reject(new Error('IDB blocked')); };
    } catch(e) {
      _bsDBFailed = true;
      reject(e);
    }
  });
}
function dbPut(id, url) {
  return openDB().then(db => new Promise((res, rej) => {
    try {
      const tx = db.transaction('images', 'readwrite');
      tx.objectStore('images').put({ id, url });
      tx.oncomplete = res; tx.onerror = e => rej(e.target.error);
    } catch(e) { rej(e); }
  })).catch(() => {}); // file:// では握りつぶす
}
function dbGetAll() {
  return openDB().then(db => new Promise((res, rej) => {
    try {
      const tx = db.transaction('images', 'readonly');
      const req = tx.objectStore('images').getAll();
      req.onsuccess = e => res(e.target.result);
      req.onerror   = e => rej(e.target.error);
    } catch(e) { rej(e); }
  })).catch(() => []); // 失敗時は空配列を返す
}
function dbClear() {
  return openDB().then(db => new Promise(res => {
    try {
      const tx = db.transaction('images', 'readwrite');
      tx.objectStore('images').clear();
      tx.oncomplete = res;
    } catch(e) { res(); }
  })).catch(() => {});
}

// phases を保存（assetsのurlは除外してIDだけ残す）
function saveState() {
  // プロジェクト名・イベント期間も保存
  const projName = document.getElementById('projName')?.value || '';
  const evtStart = document.getElementById('edStartNative')?.value || '';
  const evtEnd   = document.getElementById('edEndNative')?.value || '';
  localStorage.setItem('bsMeta', JSON.stringify({ projName, evtStart, evtEnd }));
  const data = JSON.stringify(phases);
  const chunkSize = 1024 * 1024 * 2; // 2MBずつ
  const chunks = Math.ceil(data.length / chunkSize);
  try {
    for (let i = 0; i < 20; i++) localStorage.removeItem(`bsState_${i}`);
    localStorage.setItem('bsState_chunks', String(chunks));
    for (let i = 0; i < chunks; i++) {
      localStorage.setItem(`bsState_${i}`, data.slice(i * chunkSize, (i+1) * chunkSize));
    }
  } catch(err) {
    console.warn('[BS] localStorage失敗:', err.message, '→ IDBのみ保存');
  }
  // IDBに全画像を保存（メイン保存先）
  phases.forEach(ph => {
    ph.assets.forEach(a => { if (a.url) dbPut(a.id, a.url).catch(e => console.warn('[BS] IDB失敗:', e)); });
    (ph.clientPoolAssets||[]).forEach(a => { if (a.url) dbPut(a.id, a.url).catch(e => console.warn('[BS] IDB失敗:', e)); });
  });
}

window.addEventListener('beforeunload', saveState);

// 復元: localStorage → phases構造、IndexedDB → 画像URL注入
function loadState() {
  return new Promise(async resolve => {
    try {
      // チャンク分割で保存されたデータを結合
      const chunks = parseInt(localStorage.getItem('bsState_chunks') || '0');
      let raw = '';
      if (chunks > 0) {
        for (let i = 0; i < chunks; i++) {
          raw += localStorage.getItem(`bsState_${i}`) || '';
        }
      } else {
        // 旧形式フォールバック
        raw = localStorage.getItem('bsState') || '';
      }
      if (!raw) { resolve(false); return; }

      const data = JSON.parse(raw);
      if (!Array.isArray(data) || data.length === 0) { resolve(false); return; }

      // urlがないassetはIDBから補完
      let imgMap = {};
      try {
        const imgs = await dbGetAll();
        imgs.forEach(i => { imgMap[i.id] = i.url; });
      } catch(e) {}

      // BlobURLをBase64に変換するヘルパー
      const blobToBase64 = url => new Promise(res => {
        const xhr = new XMLHttpRequest();
        xhr.responseType = 'blob';
        xhr.onload = () => {
          const reader = new FileReader();
          reader.onload = e => res(e.target.result);
          reader.readAsDataURL(xhr.response);
        };
        xhr.onerror = () => res('');
        xhr.open('GET', url);
        xhr.send();
      });

      // BlobURLをBase64に変換（localhost上なら取得可能）
      const blobConversions = [];
      data.forEach(ph => {
        (ph.assets || []).forEach(a => {
          const u = a.url || imgMap[a.id] || '';
          if (u.startsWith('blob:')) {
            blobConversions.push(blobToBase64(u).then(b64 => { if (b64) a.url = b64; }));
          }
        });
      });
      if (blobConversions.length > 0) await Promise.all(blobConversions);

      phases.length = 0;
      phCount = 0;
      data.forEach(ph => {
        ph.assets = (ph.assets || [])
          .map(a => ({ ...a, url: a.url || imgMap[a.id] || '' }))
          .filter(a => a.url);
        // ph.clientPoolAssets 復元
        ph.clientPoolAssets = (ph.clientPoolAssets || [])
          .map(a => ({ ...a, url: a.url || imgMap[a.id] || '' }))
          .filter(a => a.url);
        // 旧データ移行: ph.clientAssets → ph.clientPoolAssets
        if (ph.clientAssets) {
          const legacy = (ph.clientAssets||[])
            .map(a => ({ ...a, url: a.url || imgMap[a.id] || '' })).filter(a => a.url);
          const existingIds = new Set(ph.clientPoolAssets.map(a => a.id));
          legacy.forEach(a => { if (!existingIds.has(a.id)) ph.clientPoolAssets.push(a); });
          delete ph.clientAssets;
        }
        // 旧データ移行: clientImg → clientLayers
        Object.values(ph.formats || {}).forEach(fmtData => {
          (fmtData.variants || []).forEach(v => {
            // v.clientAssets (旧) → ph.clientPoolAssets に移行
            if (v.clientAssets && v.clientAssets.length > 0) {
              const migrated = v.clientAssets
                .map(a => ({ ...a, url: a.url || imgMap[a.id] || '' })).filter(a => a.url);
              const existingIds = new Set(ph.clientPoolAssets.map(a => a.id));
              migrated.forEach(a => { if (!existingIds.has(a.id)) ph.clientPoolAssets.push(a); });
            }
            delete v.clientAssets;
            if (!v.clientLayers) {
              v.clientLayers = v.clientImg
                ? [{ id: 'cl' + Date.now() + Math.random().toString(36).slice(2,5), assetId: v.clientImg, x: v.clientImgX||0, y: v.clientImgY||0, scale: v.clientImgScale||null }]
                : [];
              v.clientActiveLayerId = v.clientLayers.length > 0 ? v.clientLayers[0].id : null;
            }
          });
        });
        phases.push(ph);
        phCount = Math.max(phCount, parseInt(ph.id.replace('ph','')) || 0);
        renderPhaseChip(ph);
        renderPhaseModule(ph);
        refreshPool(ph);
        refreshPool(ph);
      });
      updateStats();
      // プロジェクト名・イベント期間を復元
      try {
        const meta = JSON.parse(localStorage.getItem('bsMeta') || '{}');
        if (meta.projName) {
          const el = document.getElementById('projName');
          if (el) el.value = meta.projName;
        }
        if (meta.evtStart) {
          const el = document.getElementById('edStartNative');
          if (el) { el.value = (meta.evtStart||'').split('T')[0]; el.dispatchEvent(new Event('change')); }
        }
        if (meta.evtEnd) {
          const el = document.getElementById('edEndNative');
          if (el) { el.value = (meta.evtEnd||'').split('T')[0]; el.dispatchEvent(new Event('change')); }
        }
      } catch(e) {}
      resolve(true);
    } catch(err) {
      console.warn('[BS] 復元失敗:', err);
      resolve(false);
    }
  });
}

/* ════ コメントインポート ════ */

function clearSavedState() {
  if (!confirm('保存データをすべて削除してリセットしますか？')) return;
  for (let i = 0; i < 20; i++) localStorage.removeItem(`bsState_${i}`);
  localStorage.removeItem('bsState_chunks');
  localStorage.removeItem('bsState');
  localStorage.removeItem('bsMeta');
  dbClear().catch(()=>{}).finally(() => location.reload());
}

function setupPoolDrop(phId) {
  const pool = document.getElementById(`pool_${phId}`);
  if (!pool) return;
  pool.addEventListener('dragover', e => { e.preventDefault(); pool.classList.add('drag-over') });
  pool.addEventListener('dragleave', () => pool.classList.remove('drag-over'));
  pool.addEventListener('drop', e => {
    e.preventDefault();
    pool.classList.remove('drag-over');
    if (e.dataTransfer.files.length) {
      currentUploadTarget = phId;
      const ph = phases.find(p => p.id === phId); if (!ph) return;
      const _files = Array.from(e.dataTransfer.files);
      let _pending = _files.length;
      _files.forEach(f => {
        const _id = 'a'+Date.now()+Math.random().toString(36).slice(2,5);
        const _name = f.name;
        compressImage(f).then(url => {
          if (currentMode === 'client') {
            if (!ph.clientPoolAssets) ph.clientPoolAssets = [];
            ph.clientPoolAssets.push({ id:_id, url, name:_name });
          } else {
            ph.assets.push({ id:_id, url, name:_name });
          }
          if (--_pending === 0) { refreshPool(ph); saveState(); }
        });
      });
      if (currentMode !== 'client') {
        Object.keys(ph.formats).forEach(fid => {
          const baseId = fid.replace(/_\d+$/, '');
          const fmt = FORMATS.find(f => f.id === fid) || FORMATS.find(f => f.id === baseId) || { id: fid, label: fid, ratio: '', cssRatio: '1/1', dims: '' };
          refreshFormatPanel(ph, { ...fmt, id: fid });
        });
        updateStats();
      }
    }
  });
}

function refreshPool(ph) {
  const pool = document.getElementById(`pool_${ph.id}`); if (!pool) return;
  const hint = document.getElementById(`poolHint_${ph.id}`);
  const assets = currentMode === 'client' ? (ph.clientPoolAssets||[]) : ph.assets;
  document.getElementById(`pcount_${ph.id}`).textContent = assets.length;
  pool.innerHTML = '';
  if (assets.length === 0) {
    if (hint) pool.appendChild(hint);
    return;
  }
  assets.forEach(a => {
    const wrap = document.createElement('div');
    wrap.className = 'pool-thumb-wrap';
    wrap.dataset.id = a.id;
    wrap.innerHTML = `
      <img class="pool-thumb" src="${a.url}" alt="${esc(a.name)}" draggable="true"
        title="${esc(a.name)}">
      <button class="pool-thumb-del" onclick="event.stopPropagation();deleteAsset('${ph.id}','${a.id}')">
        <svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/>
        </svg>
      </button>`;
    const img = wrap.querySelector('.pool-thumb');
    img.addEventListener('dragstart', ev => {
      dragSrc = { phId: ph.id, assetId: a.id };
      img.classList.add('dragging');
      ev.dataTransfer.effectAllowed = 'copy';
      ev.dataTransfer.setData('text/plain', a.id);
    });
    img.addEventListener('dragend', () => img.classList.remove('dragging'));
    _initPoolThumbTouch(img, ph.id, a.id); // iOS タッチドラッグ
    pool.appendChild(wrap);
  });
}

function deleteAsset(phId, assetId) {
  const ph = phases.find(p => p.id === phId); if (!ph) return;
  if (currentMode === 'client') {
    ph.clientPoolAssets = (ph.clientPoolAssets||[]).filter(a => a.id !== assetId);
  } else {
    ph.assets = ph.assets.filter(a => a.id !== assetId);
    Object.keys(ph.formats).forEach(fid => {
      const baseId = fid.replace(/_\d+$/, '');
      const fmt = FORMATS.find(f => f.id === fid) || FORMATS.find(f => f.id === baseId);
      if (!fmt) return;
      ph.formats[fid].variants.forEach(v => { if (v.img === assetId) v.img = null; });
      refreshFormatPanel(ph, { ...fmt, id: fid });
    });
    updateStats();
  }
  refreshPool(ph);
  saveState();
}

/* ════ DRAG-DROP into slot ════ */
function onSlotDrop(event, phId, fmtId, vid) {
  event.preventDefault();
  event.currentTarget.classList.remove('drag-hover');
  const assetId = event.dataTransfer.getData('text/plain') || dragSrc?.assetId;
  if (!assetId) return;
  // Accept only assets from the same phase
  const ph = phases.find(p => p.id === phId); if (!ph) return;
  const asset = ph.assets.find(a => a.id === assetId); if (!asset) return;
  const v = ph.formats[fmtId].variants.find(v => v.id === vid); if (!v) return;
  v.img = assetId;
  const baseId = fmtId.replace(/_\d+$/, '');
  const fmt = FORMATS.find(f => f.id === fmtId) || FORMATS.find(f => f.id === baseId);
  refreshFormatPanel(ph, { ...fmt, id: fmtId });
  checkPhaseWarn(ph);
  updateStats();
  saveState();
}

function clearSlotImg(phId, fmtId, vid) {
  const ph = phases.find(p => p.id === phId); if (!ph) return;
  const v  = ph.formats[fmtId].variants.find(v => v.id === vid); if (!v) return;
  v.img = null;
  refreshFormatPanel(ph, (FORMATS.find(f => f.id === fmtId) || FORMATS.find(f => f.id === fmtId.replace(/_\d+$/, ''))));
  checkPhaseWarn(ph);
  updateStats();
  saveState();
}

let _taCtx = null;
function openTaModal(phId, fmtId, vid) {
  const ph = phases.find(p => p.id === phId); if (!ph) return;
  const v  = ph.formats[fmtId]?.variants.find(v => v.id === vid); if (!v) return;
  const fmt = FORMATS.find(f => f.id === fmtId);
  _taCtx = { phId, fmtId, vid };

  const ta = document.getElementById('taModalTa');
  ta.value = v.text || '';
  ta.oninput = () => updateVText(phId, fmtId, vid, ta.value);

  const title = document.getElementById('taModalTitle');
  if (title) title.textContent = `コピーテキスト — ${fmt?.label || ''}`;

  document.getElementById('taModal').classList.add('open');
  setTimeout(() => ta.focus(), 50);
}

function closeTaModal(e) {
  if (e && e.target !== document.getElementById('taModal')) return;
  document.getElementById('taModal').classList.remove('open');
  // 元のテキストエリアに反映
  if (_taCtx) {
    const ta = document.getElementById(`ta_${_taCtx.vid}`);
    const modal = document.getElementById('taModalTa');
    if (ta && modal) ta.value = modal.value;
    _taCtx = null;
  }
}

function updateVText(phId, fmtId, vid, val) {
  const ph = phases.find(p => p.id === phId); if (!ph) return;
  const v  = ph.formats[fmtId].variants.find(v => v.id === vid); if (!v) return;
  v.text = val;
  const noTxt = !val.trim();
  document.getElementById(`ta_${vid}`)?.classList.toggle('warn', noTxt);
  document.getElementById(`txtwarn_${vid}`)?.classList.toggle('show', noTxt);
  // Update complete dot
  const hasImg = !!v.img;
  document.getElementById(`vdot_${vid}`)?.classList.toggle('show', hasImg && !noTxt);
  checkPhaseWarn(ph);
  updateStats();
  syncIgCaption(vid);
  saveState();
}

/* ════ WARNINGS ════ */
function checkPhaseWarn(ph) {
  let hw = false;
  FORMATS.forEach(f => {
    if (!ph.formats[f.id]) return;
    ph.formats[f.id].variants.forEach(v => {
      if (!v.img || !v.text.trim()) hw = true;
    });
  });
  document.getElementById(`wchip_${ph.id}`)?.classList.toggle('show', hw);
  return hw;
}

/* ════ STATS ════ */
function updateStats() {
  let slots = 0;
  phases.forEach(ph => {
    Object.keys(ph.formats).forEach(fid => {
      ph.formats[fid].variants.forEach(() => { slots++; });
    });
  });
  document.getElementById('sPhases').textContent = phases.length;
  document.getElementById('sSlots').textContent  = slots;
}

/* ════ PHASE NAME ════ */
function updatePhaseName(id, val) {
  const ph = phases.find(p => p.id === id); if (!ph) return;
  ph.name = val;
  const chipName = document.querySelector(`#pchip_${id} .phase-chip-name`);
  if (chipName) chipName.textContent = val;
}

/* ════ THEME ════ */
const THEME_KEYS = { production: 'bsThemeProd', client: 'bsThemeClient' };

function getThemeForMode(mode) {
  return localStorage.getItem(THEME_KEYS[mode] || THEME_KEYS.production) || 'light';
}

function applyTheme(mode) {
  const theme = getThemeForMode(mode);
  if (theme === 'dark') {
    document.body.setAttribute('data-theme', 'dark');
  } else {
    document.body.removeAttribute('data-theme');
  }
  const btn = document.getElementById('themeToggleBtn');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}

function toggleTheme() {
  const key = THEME_KEYS[currentMode] || THEME_KEYS.production;
  const next = (localStorage.getItem(key) || 'light') === 'dark' ? 'light' : 'dark';
  localStorage.setItem(key, next);
  applyTheme(currentMode);
}

/* ════ MODE SWITCH ════ */
function switchMode(mode, el) {
  currentMode = mode;
  applyTheme(mode);
  document.querySelectorAll('.mode-seg-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  // 全フォーマットパネルを再描画＋プール切り替え
  phases.forEach(ph => {
    refreshPool(ph);
    Object.keys(ph.formats).forEach(fid => {
      const baseId = fid.replace(/_\d+$/,'');
      const fmt = FORMATS.find(f=>f.id===fid) || FORMATS.find(f=>f.id===baseId) || {id:fid,label:fid,ratio:'',cssRatio:'1/1',dims:''};
      refreshFormatPanel(ph, {...fmt, id:fid});
    });
  });
}

/* ════ CLIENT PANEL ════ */
let _clientCtx = null; // { phId, fmtId, vid }
let _clientImgDrag = null;

function openClientPanel(phId, fmtId, vid) {
  const ph = phases.find(p => p.id === phId); if (!ph) return;
  if (!ph.clientPoolAssets) ph.clientPoolAssets = [];

  _clientCtx = { phId, fmtId, vid };

function clientPanelBgClick(event) {

}

function closeClientPanel() {
  if (_clientCtx) {
    // フレームをcanvasで合成してプレビューを保存
    generateClientPreview(_clientCtx).then(() => {
      document.getElementById('clientPanelBg').classList.remove('open');
      const { phId, fmtId } = _clientCtx;
      const ph = phases.find(p => p.id === phId);
      if (ph) {
        const baseId = fmtId.replace(/_\d+$/,'');
        const fmt = FORMATS.find(f=>f.id===fmtId) || FORMATS.find(f=>f.id===baseId) || {id:fmtId,label:fmtId,ratio:'',cssRatio:'1/1',dims:''};
        refreshFormatPanel(ph, {...fmt, id:fmtId});
      }
      _clientCtx = null;
    });
  } else {
    document.getElementById('clientPanelBg').classList.remove('open');
  }
}

async function generateClientPreview(ctx) {
  const ph = phases.find(p => p.id === ctx.phId); if (!ph) return;
  const v = ph.formats[ctx.fmtId]?.variants.find(v => v.id === ctx.vid); if (!v) return;
  const layers = v.clientLayers || [];
  if (layers.length === 0) { v.clientPreview = null; saveState(); return; }

  const frameEl = document.getElementById('clientFrameEl');
  if (!frameEl) return;
  const frameRect = frameEl.getBoundingClientRect();
  const fw = frameRect.width, fh = frameRect.height;
  if (!fw || !fh) return;

  const canvas = document.createElement('canvas');
  canvas.width = fw; canvas.height = fh;
  const ctx2 = canvas.getContext('2d');
  ctx2.fillStyle = '#ffffff';
  ctx2.fillRect(0, 0, fw, fh);

  for (const layer of layers) {
    const asset = (ph.clientPoolAssets||[]).find(a => a.id === layer.assetId);
    if (!asset) continue;
    const domImg = frameEl.querySelector(`[data-layer-id="${layer.id}"]`);
    if (domImg && domImg.complete && domImg.naturalWidth > 0) {
      const r = domImg.getBoundingClientRect();
      const x = r.left - frameRect.left, y = r.top - frameRect.top;
      if (r.width > 0 && r.height > 0) { ctx2.drawImage(domImg, x, y, r.width, r.height); continue; }
    }
    await new Promise(res => {
      const tmp = new Image();
      tmp.onload = () => {
        const nw = tmp.naturalWidth, nh = tmp.naturalHeight;
        const sc = (layer.scale != null) ? layer.scale : Math.min(fw/nw, fh/nh);
        ctx2.save();
        ctx2.translate(fw/2 + (layer.x??0), fh/2 + (layer.y??0));
        ctx2.scale(sc, sc);
        ctx2.drawImage(tmp, -nw/2, -nh/2, nw, nh);
        ctx2.restore();
        res();
      };
      tmp.onerror = res;
      tmp.src = asset.url;
    });
  }
  v.clientPreview = canvas.toDataURL('image/jpeg', 0.85);
  saveState();
}

function renderClientFrame() {
  if (!_clientCtx) return;
  const ph = phases.find(p => p.id === _clientCtx.phId); if (!ph) return;
  const v = ph.formats[_clientCtx.fmtId]?.variants.find(v => v.id === _clientCtx.vid); if (!v) return;
  const frameEl = document.getElementById('clientFrameEl');
  const layers = v.clientLayers || [];

  if (layers.length > 0) {
    // 既存のDOMを保持しつつ差分更新（imgを再生成しない）
    const existingWraps = {};
    frameEl.querySelectorAll('.client-layer-wrap').forEach(w => {
      const img = w.querySelector('img');
      if (img) existingWraps[img.dataset.layerId] = w;
    });

    layers.forEach(layer => {
      const asset = (ph.clientPoolAssets||[]).find(a => a.id === layer.assetId);
      if (!asset) return;
      const isActive = layer.id === v.clientActiveLayerId;

      if (existingWraps[layer.id]) {
        const img = existingWraps[layer.id].querySelector('img');
        if (img) {
          if (layer.scale != null) {
            img.style.transform = `translate(${layer.x??0}px,${layer.y??0}px) scale(${layer.scale})`;
          }
          img.classList.toggle('active', isActive);
        }
        delete existingWraps[layer.id];
      } else {
        const wrap = document.createElement('div');
        wrap.className = 'client-layer-wrap';
        const img = document.createElement('img');
        img.dataset.layerId = layer.id;
        if (isActive) img.classList.add('active');
        if (layer.scale != null) {
          img.style.transform = `translate(${layer.x??0}px,${layer.y??0}px) scale(${layer.scale})`;
        }
        img.addEventListener('load', () => clientLayerImgLoaded(layer.id));
        img.addEventListener('pointerdown', e => clientLayerDragStart(e, layer.id));
        img.src = asset.url;
        wrap.appendChild(img);
        frameEl.appendChild(wrap);
      }
    });

    // 削除されたレイヤーをDOMから除去
    Object.values(existingWraps).forEach(w => w.remove());

    // スライダーをアクティブレイヤーに合わせる
    const activeLayer = layers.find(l => l.id === v.clientActiveLayerId);
    const slider = document.getElementById('clientScaleSlider');
    const label  = document.getElementById('clientScaleLabel');
    if (activeLayer && activeLayer.scale != null && slider) {
      slider.value = activeLayer.scale;
      if (label) label.textContent = Math.round(activeLayer.scale * 100) + '%';
    } else if (slider) {
      slider.value = 1;
      if (label) label.textContent = '100%';
    }
    const removeBtn = document.getElementById('clientLayerRemoveBtn');
    if (removeBtn) removeBtn.disabled = !v.clientActiveLayerId;
  } else {
    frameEl.innerHTML = `
      <div class="v-slot-empty">
        <svg width="22" height="22" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="5" width="28" height="22" rx="3"/><circle cx="11" cy="13" r="3"/>
          <polyline points="2 23 10 16 15 21 21 15 30 23"/>
        </svg>
        <span>素材をクリックまたはドロップして配置</span>
      </div>`;
    const slider = document.getElementById('clientScaleSlider');
    const label  = document.getElementById('clientScaleLabel');
    if (slider) { slider.value = 1; if (label) label.textContent = '100%'; }
    const removeBtn = document.getElementById('clientLayerRemoveBtn');
    if (removeBtn) removeBtn.disabled = true;
  }
}

function renderClientPool() {
  if (!_clientCtx) return;
  const ph = phases.find(p => p.id === _clientCtx.phId); if (!ph) return;
  const v = ph.formats[_clientCtx.fmtId]?.variants.find(v => v.id === _clientCtx.vid);
  const grid = document.getElementById('clientPoolGrid');
  const usedIds = new Set((v?.clientLayers||[]).map(l => l.assetId));
  const poolAssets = ph.clientPoolAssets || [];
  if (poolAssets.length === 0) {
    grid.innerHTML = '<div class="client-pool-empty">素材がありません。アップロードしてください。</div>';
    return;
  }
  grid.innerHTML = poolAssets.map(a => `
    <div class="client-pool-thumb-wrap">
      <img class="client-pool-thumb${usedIds.has(a.id) ? ' selected' : ''}"
        src="${a.url}" title="${esc(a.name)}"
        draggable="true"
        ondragstart="clientThumbDragStart(event,'${a.id}')"
        onclick="addClientLayer('${a.id}')">
      <button class="client-pool-thumb-del" onclick="deleteClientAsset('${ph.id}','${a.id}')">
        <svg width="7" height="7" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/>
        </svg>
      </button>
    </div>
  `).join('');
}

function triggerClientUpload() {
  document.getElementById('clientFileInput').click();
}

function onClientFileInput(event) {
  if (!_clientCtx) return;
  const ph = phases.find(p => p.id === _clientCtx.phId); if (!ph) return;
  if (!ph.clientPoolAssets) ph.clientPoolAssets = [];
  const files = Array.from(event.target.files);
  files.forEach(f => {
    compressImage(f).then(url => {
      const id = 'ca' + Date.now() + Math.random().toString(36).slice(2,5);
      ph.clientPoolAssets.push({ id, url, name: f.name });
      dbPut(id, url).catch(e => console.warn('[BS] IDB失敗:', e));
      renderClientPool();
      saveState();
    });
  });
  event.target.value = '';
}

function addClientLayer(assetId) {
  if (!_clientCtx) return;
  const ph = phases.find(p => p.id === _clientCtx.phId); if (!ph) return;
  const v = ph.formats[_clientCtx.fmtId]?.variants.find(v => v.id === _clientCtx.vid); if (!v) return;
  if (!v.clientLayers) v.clientLayers = [];
  const layerId = 'cl' + Date.now() + Math.random().toString(36).slice(2,5);
  v.clientLayers.push({ id: layerId, assetId, x: 0, y: 0, scale: null });
  v.clientActiveLayerId = layerId;
  renderClientFrame();
  renderClientPool();
  saveState();
}

function removeActiveClientLayer() {
  if (!_clientCtx) return;
  const ph = phases.find(p => p.id === _clientCtx.phId); if (!ph) return;
  const v = ph.formats[_clientCtx.fmtId]?.variants.find(v => v.id === _clientCtx.vid); if (!v) return;
  if (!v.clientActiveLayerId) return;
  v.clientLayers = (v.clientLayers||[]).filter(l => l.id !== v.clientActiveLayerId);
  v.clientActiveLayerId = v.clientLayers.length > 0 ? v.clientLayers[v.clientLayers.length - 1].id : null;
  renderClientFrame();
  renderClientPool();
  saveState();
}

function deleteClientAsset(phId, assetId) {
  const ph = phases.find(p => p.id === phId); if (!ph) return;
  ph.clientPoolAssets = (ph.clientPoolAssets||[]).filter(a => a.id !== assetId);
  // アセットを使用していた全バリアントのレイヤーを削除
  Object.values(ph.formats).forEach(fmtData => {
    fmtData.variants.forEach(v => {
      v.clientLayers = (v.clientLayers||[]).filter(l => l.assetId !== assetId);
      if (v.clientLayers.length === 0) v.clientActiveLayerId = null;
      else if (!v.clientLayers.find(l => l.id === v.clientActiveLayerId))
        v.clientActiveLayerId = v.clientLayers[v.clientLayers.length - 1].id;
    });
  });
  renderClientPool();
  renderClientFrame();
  saveState();
}

/* ── 画像ロード時にフィットスケールを自動計算 ── */
function clientLayerImgLoaded(layerId) {
  if (!_clientCtx) return;
  const ph = phases.find(p => p.id === _clientCtx.phId); if (!ph) return;
  const v = ph.formats[_clientCtx.fmtId]?.variants.find(v => v.id === _clientCtx.vid); if (!v) return;
  const layer = (v.clientLayers||[]).find(l => l.id === layerId); if (!layer) return;
  const imgEl = document.querySelector(`[data-layer-id="${layerId}"]`); if (!imgEl) return;
  const isActive = layerId === v.clientActiveLayerId;
  if (layer.scale != null) {
    // 保存済みのtransformを必ず適用（再描画後も位置・サイズを維持）
    imgEl.style.transform = `translate(${layer.x??0}px,${layer.y??0}px) scale(${layer.scale})`;
    if (isActive) {
      const slider = document.getElementById('clientScaleSlider');
      const label  = document.getElementById('clientScaleLabel');
      if (slider) { slider.value = layer.scale; }
      if (label)  label.textContent = Math.round(layer.scale * 100) + '%';
    }
    return;
  }
  // Auto-fit スケール計算
  const frameEl = document.getElementById('clientFrameEl');
  const nw = imgEl.naturalWidth, nh = imgEl.naturalHeight;
  const fw = frameEl.offsetWidth,  fh = frameEl.offsetHeight;
  if (!nw || !nh || !fw || !fh) return;
  const fit = Math.min(fw / nw, fh / nh);
  layer.scale = Math.round(fit * 1000) / 1000;
  layer.x = 0; layer.y = 0;
  imgEl.style.transform = `translate(0px,0px) scale(${layer.scale})`;
  if (isActive) {
    const slider = document.getElementById('clientScaleSlider');
    const label  = document.getElementById('clientScaleLabel');
    if (slider) {
      slider.min   = Math.max(0.05, layer.scale * 0.2).toFixed(3);
      slider.max   = Math.min(10,   layer.scale * 5  ).toFixed(3);
      slider.value = layer.scale;
    }
    if (label) label.textContent = Math.round(layer.scale * 100) + '%';
  }
  saveState();
}

/* ── スケールスライダー（アクティブレイヤーのみ） ── */
function clientImgScaleChanged(val) {
  const scale = parseFloat(val);
  if (!_clientCtx) return;
  const ph = phases.find(p => p.id === _clientCtx.phId); if (!ph) return;
  const v = ph.formats[_clientCtx.fmtId]?.variants.find(v => v.id === _clientCtx.vid); if (!v) return;
  const layer = (v.clientLayers||[]).find(l => l.id === v.clientActiveLayerId); if (!layer) return;
  layer.scale = scale;
  const imgEl = document.querySelector(`[data-layer-id="${layer.id}"]`);
  if (imgEl) imgEl.style.transform = `translate(${layer.x??0}px,${layer.y??0}px) scale(${scale})`;
  const label = document.getElementById('clientScaleLabel');
  if (label) label.textContent = Math.round(scale * 100) + '%';
  saveState();
}

/* ── レイヤー選択 ── */
function setActiveClientLayer(layerId) {
  if (!_clientCtx) return;
  const ph = phases.find(p => p.id === _clientCtx.phId); if (!ph) return;
  const v = ph.formats[_clientCtx.fmtId]?.variants.find(v => v.id === _clientCtx.vid); if (!v) return;
  v.clientActiveLayerId = layerId;
  document.querySelectorAll('.client-layer-wrap img').forEach(img => {
    img.classList.toggle('active', img.dataset.layerId === layerId);
  });
  const layer = (v.clientLayers||[]).find(l => l.id === layerId);
  const slider = document.getElementById('clientScaleSlider');
  const label  = document.getElementById('clientScaleLabel');
  if (layer && slider) {
    const s = layer.scale ?? 1;
    slider.value = s;
    if (label) label.textContent = Math.round(s * 100) + '%';
  }
  const removeBtn = document.getElementById('clientLayerRemoveBtn');
  if (removeBtn) removeBtn.disabled = false;
}

/* ── フレーム内 レイヤードラッグ（ピクセルオフセット方式） ── */
function clientLayerDragStart(event, layerId) {
  event.preventDefault();
  setActiveClientLayer(layerId);
  if (!_clientCtx) return;
  const ph = phases.find(p => p.id === _clientCtx.phId); if (!ph) return;
  const v = ph.formats[_clientCtx.fmtId]?.variants.find(v => v.id === _clientCtx.vid); if (!v) return;
  const layer = (v.clientLayers||[]).find(l => l.id === layerId); if (!layer) return;
  const imgEl = document.querySelector(`[data-layer-id="${layerId}"]`); if (!imgEl) return;
  _clientImgDrag = {
    layer, imgEl,
    startX: event.clientX, startY: event.clientY,
    startOffsetX: layer.x ?? 0,
    startOffsetY: layer.y ?? 0,
  };
  imgEl.classList.add('dragging');
  imgEl.setPointerCapture(event.pointerId);
  imgEl.addEventListener('pointermove', clientLayerPointerMove);
  imgEl.addEventListener('pointerup', clientLayerPointerUp);
  imgEl.addEventListener('pointercancel', clientLayerPointerUp);
}

function clientLayerPointerMove(event) {
  if (!_clientImgDrag) return;
  const dx = event.clientX - _clientImgDrag.startX;
  const dy = event.clientY - _clientImgDrag.startY;
  const nx = _clientImgDrag.startOffsetX + dx;
  const ny = _clientImgDrag.startOffsetY + dy;
  const s = _clientImgDrag.layer.scale ?? 1;
  _clientImgDrag.layer.x = nx;
  _clientImgDrag.layer.y = ny;
  _clientImgDrag.imgEl.style.transform = `translate(${nx}px,${ny}px) scale(${s})`;
}

function clientLayerPointerUp(event) {
  if (!_clientImgDrag) return;
  const imgEl = _clientImgDrag.imgEl;
  imgEl.removeEventListener('pointermove', clientLayerPointerMove);
  imgEl.removeEventListener('pointerup', clientLayerPointerUp);
  imgEl.removeEventListener('pointercancel', clientLayerPointerUp);
  imgEl.classList.remove('dragging');
  saveState();
  _clientImgDrag = null;
}

function clientLayerDragMove() {}
function clientLayerDragEnd() {}

/* ── プールサムネイル → フレーム へのドラッグ ── */
function clientThumbDragStart(event, assetId) {
  event.dataTransfer.setData('text/plain', assetId);
  event.dataTransfer.effectAllowed = 'copy';
}

/* ── フレームのドロップゾーン（サムネイル & ファイル両対応） ── */
function clientFrameDragOver(event) {
  event.preventDefault();
  event.dataTransfer.dropEffect = 'copy';
  document.getElementById('clientFrameEl').classList.add('frame-drag-over');
}
function clientFrameDragLeave(event) {
  if (!document.getElementById('clientFrameEl').contains(event.relatedTarget))
    document.getElementById('clientFrameEl').classList.remove('frame-drag-over');
}
function clientFrameDrop(event) {
  event.preventDefault();
  document.getElementById('clientFrameEl').classList.remove('frame-drag-over');
  if (!_clientCtx) return;
  const ph = phases.find(p => p.id === _clientCtx.phId); if (!ph) return;
  if (!ph.clientPoolAssets) ph.clientPoolAssets = [];
  // ファイルドロップ（OS から）—複数ファイル対応
  if (event.dataTransfer.files.length > 0) {
    Array.from(event.dataTransfer.files).forEach(f => {
      if (!f.type.startsWith('image/')) return;
      compressImage(f).then(url => {
        const id = 'ca' + Date.now() + Math.random().toString(36).slice(2,5);
        ph.clientPoolAssets.push({ id, url, name: f.name });
        dbPut(id, url).catch(e => console.warn('[BS] IDB失敗:', e));
        addClientLayer(id);
      });
    });
    return;
  }
  // サムネイルドラッグ（assetId）
  const assetId = event.dataTransfer.getData('text/plain');
  if (assetId) addClientLayer(assetId);
}

const DYN_FIELD_LABELS = {
  title:       'タイトル',
  description: '説明文',
  cta:         'CTA',
  url:         'URL',
};

function dynFieldHTML(vid, field, idx) {
  const label = DYN_FIELD_LABELS[field.type] || field.type;
  const isMultiline = field.type === 'description';
  return `
    <div class="dyn-field-row" id="dfrow_${vid}_${field.type}">
      <div class="dyn-field-label">${label}</div>
      ${isMultiline
        ? `<textarea class="dyn-field-inp" rows="2"
             placeholder="${label}を入力..."
             oninput="updateDynField('${vid}','${field.type}',this.value)">${esc(field.value)}</textarea>`
        : `<input type="${field.type === 'url' ? 'url' : 'text'}" class="dyn-field-inp"
             placeholder="${label}を入力..."
             value="${esc(field.value)}"
             oninput="updateDynField('${vid}','${field.type}',this.value)">`
      }
      <button class="dyn-field-del" onclick="removeDynField('${vid}','${field.type}')" title="削除">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/>
        </svg>
      </button>
    </div>`;
}

function addDynField(phId, fmtId, vid, selectEl) {
  const type = selectEl.value;
  if (!type) return;
  selectEl.value = ''; // reset

  // Find variant in data
  const ph = phases.find(p => p.id === phId); if (!ph) return;
  const v  = ph.formats[fmtId]?.variants.find(v => v.id === vid); if (!v) return;
  if (!v.fields) v.fields = [];

  // Prevent duplicates
  if (v.fields.find(f => f.type === type)) return;

  const field = { type, value: '' };
  v.fields.push(field);

  // Append to DOM without full re-render
  const container = document.getElementById(`dynfields_${vid}`);
  if (!container) return;
  const div = document.createElement('div');
  div.innerHTML = dynFieldHTML(vid, field, v.fields.length - 1);
  container.appendChild(div.firstElementChild);

  // If we just added description, update caption preview if modal is open
  syncIgCaption(vid);
}

function updateDynField(vid, type, value) {
  // Find variant across all phases/formats
  let found = null;
  for (const ph of phases) {
    for (const fmtId of Object.keys(ph.formats)) {
      const v = ph.formats[fmtId].variants.find(v => v.id === vid);
      if (v) { found = v; break; }
    }
    if (found) break;
  }
  if (!found) return;
  if (!found.fields) found.fields = [];
  const field = found.fields.find(f => f.type === type);
  if (field) field.value = value;

  // Live update caption if modal is open for this variant
  syncIgCaption(vid);
}

function removeDynField(vid, type) {
  let found = null;
  for (const ph of phases) {
    for (const fmtId of Object.keys(ph.formats)) {
      const v = ph.formats[fmtId].variants.find(v => v.id === vid);
      if (v) { found = v; break; }
    }
    if (found) break;
  }
  if (!found) return;
  found.fields = (found.fields || []).filter(f => f.type !== type);

  const row = document.getElementById(`dfrow_${vid}_${type}`);
  row?.remove();

  syncIgCaption(vid);
}
